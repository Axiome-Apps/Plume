<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3f52"/>
      <stop offset="55%" stop-color="#2a2d3a"/>
      <stop offset="100%" stop-color="#23252f"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#6471a4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6471a4" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="squircle">
      <rect x="100" y="100" width="824" height="824" rx="185" ry="185"/>
    </clipPath>
  </defs>

  <!-- Squircle (safe area macOS, 824×824 dans canvas 1024) -->
  <g clip-path="url(#squircle)">
    <rect x="100" y="100" width="824" height="824" fill="url(#bg)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#spot)"/>
  </g>
  <!-- Rim light haut -->
  <rect x="101.5" y="101.5" width="821" height="821" rx="183.5" ry="183.5"
        fill="none" stroke="url(#rim)" stroke-width="3"/>

  <!-- Logo Plume centré dans le squircle -->
  <g transform="translate(225 195) scale(9.6)" fill="none" stroke="#6471a4" stroke-linecap="round">
    <path d="M 14 56 L 46 14" stroke-width="2.4"/>
    <path d="M 22 48 L 32 48" stroke-width="1.8"/>
    <path d="M 26 42 L 38 42" stroke-width="1.8"/>
    <path d="M 30 36 L 42 36" stroke-width="1.8"/>
    <path d="M 34 30 L 44 30" stroke-width="1.8"/>
    <path d="M 38 24 L 46 24" stroke-width="1.8"/>
  </g>
</svg>
