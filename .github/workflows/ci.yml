name: CI

# Tier BASIQUE côté JS/TS, sur chaque push/PR : garde de version, lint, type-check. En secondes.
# Le Rust (fmt + clippy) vit dans rust.yml, filtré sur `src-tauri/**` → un commit docs/front ne
# paie jamais la compilation native. Les tests + builds sont dans release.yml (gate au bump).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      # Garde anti-dérive des versions : les 4 fichiers (package.json, tauri.conf.json,
      # Cargo.toml, Cargo.lock) doivent s'accorder. Échoue si quelqu'un a édité à la main
      # au lieu de passer par `pnpm bump`. Node seul suffit — aucune install requise.
      - name: Version consistency guard
        run: node scripts/check-version.mjs

      - name: Install frontend dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check
